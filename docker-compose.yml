# DishSpace AI — Docker Compose
# Run:  docker compose up

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  demo:
    build: .
    command: ["python", "-m", "streamlit", "run", "demo/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
